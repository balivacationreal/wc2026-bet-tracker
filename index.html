<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 Bet Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans text-slate-800 p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <div class="flex items-center gap-4">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/2026_FIFA_World_Cup_logo.svg/200px-2026_FIFA_World_Cup_logo.svg.png" alt="WC 2026 Logo" class="h-16 w-auto object-contain">
                <div>
                    <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Bet Tracker</h1>
                    <p class="text-slate-500 mt-1">Manage 1-on-1 bets in IDR with Handicaps</p>
                </div>
            </div>
            
            <div class="mt-4 md:mt-0 flex flex-col md:flex-row gap-3 items-center">
                <button id="btn-reset" onclick="resetData()" class="hidden bg-red-50 text-red-600 hover:bg-red-100 border border-red-200 px-4 py-2 rounded-lg font-medium transition text-sm">
                    Reset Demo Data
                </button>
                
                <button id="btn-login" onclick="toggleAuth()" class="bg-slate-800 text-white hover:bg-slate-700 px-6 py-2 rounded-lg font-medium transition text-sm shadow-sm">
                    🔒 Admin Login
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <div class="flex justify-between items-center border-b pb-2">
                    <h2 class="text-xl font-bold text-slate-800">Fixtures & Bets</h2>
                    <span id="auth-status-badge" class="text-xs font-bold px-2 py-1 bg-slate-200 text-slate-600 rounded-md uppercase tracking-wide">Viewing as Guest</span>
                </div>
                <div id="matches-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </div>

            <div class="space-y-6">
                <h2 class="text-xl font-bold text-slate-800 border-b pb-2">Leaderboard</h2>
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
                                <th class="p-4 border-b">Player</th>
                                <th class="p-4 border-b text-right">Net Balance</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body" class="divide-y divide-slate-100">
                            </tbody>
                    </table>
                </div>

                <h2 class="text-xl font-bold text-slate-800 border-b pb-2 mt-8">Settlements (Debts)</h2>
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
                    <ul id="debts-list" class="space-y-3 text-sm">
                        </ul>
                </div>
            </div>
        </div>
    </div>

    <div id="login-modal" class="fixed inset-0 bg-slate-900 bg-opacity-50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden">
            <div class="bg-slate-800 p-4 text-white flex justify-between items-center">
                <h3 class="font-bold text-lg">Admin Access</h3>
                <button onclick="closeModal('login-modal')" class="text-slate-300 hover:text-white text-xl">&times;</button>
            </div>
            <div class="p-6">
                <form id="login-form" onsubmit="submitLogin(event)">
                    <div class="mb-6">
                        <label class="block text-sm font-bold text-slate-700 mb-2">Enter Password</label>
                        <input type="password" id="admin-password-input" required class="w-full border-slate-300 border rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="••••••••">
                        <p id="login-error" class="text-red-500 text-xs mt-2 hidden">Incorrect password. Please try again.</p>
                    </div>
                    <button type="submit" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded-lg transition">Login</button>
                </form>
            </div>
        </div>
    </div>

    <div id="bet-modal" class="fixed inset-0 bg-slate-900 bg-opacity-50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden max-h-[90vh] overflow-y-auto">
            <div class="bg-slate-800 p-4 text-white flex justify-between items-center sticky top-0">
                <h3 id="bet-modal-title" class="font-bold text-lg">Add New Bet</h3>
                <button onclick="closeModal('bet-modal')" class="text-slate-300 hover:text-white text-xl">&times;</button>
            </div>
            <div class="p-6">
                <form id="bet-form" onsubmit="submitBet(event)">
                    <input type="hidden" id="bet-match-id">
                    <input type="hidden" id="bet-id">
                    
                    <div class="mb-4">
                        <label id="label-team-home" class="block text-sm font-bold text-slate-700 mb-1">Team A Pick</label>
                        <select id="player-home" required class="w-full border-slate-300 border rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none"></select>
                    </div>

                    <div class="mb-4">
                        <label id="label-team-away" class="block text-sm font-bold text-slate-700 mb-1">Team B Pick</label>
                        <select id="player-away" required class="w-full border-slate-300 border rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none"></select>
                    </div>

                    <div class="mb-4 border-t pt-4 border-slate-100">
                        <label class="block text-sm font-bold text-slate-700 mb-1">Handicap (Voor) Given To</label>
                        <select id="bet-handicap-team" class="w-full border-slate-300 border rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="">No Handicap</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-bold text-slate-700 mb-1">Handicap Goals (e.g. 0.5, 1, 1.5)</label>
                        <input type="number" id="bet-handicap-value" min="0" step="0.5" value="0" class="w-full border-slate-300 border rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <div class="mb-6 border-t pt-4 border-slate-100">
                        <label class="block text-sm font-bold text-slate-700 mb-1">Bet Amount (IDR)</label>
                        <input type="number" id="bet-amount" required min="1000" step="1000" class="w-full border-slate-300 border rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. 50000">
                    </div>

                    <div class="flex gap-3">
                        <button type="button" id="delete-bet-btn" onclick="deleteBet()" class="hidden bg-red-100 text-red-600 hover:bg-red-200 font-bold py-3 px-4 rounded-lg transition text-sm">
                            🗑️ Delete
                        </button>
                        <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition">
                            Save Bet
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="result-modal" class="fixed inset-0 bg-slate-900 bg-opacity-50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden">
            <div class="bg-slate-800 p-4 text-white flex justify-between items-center">
                <h3 class="font-bold text-lg">Edit Match Result</h3>
                <button onclick="closeModal('result-modal')" class="text-slate-300 hover:text-white">&times;</button>
            </div>
            <div class="p-6">
                <form id="result-form" onsubmit="submitResult(event)">
                    <input type="hidden" id="result-match-id">
                    
                    <div class="flex items-center justify-between gap-4 mb-6">
                        <div class="text-center w-1/2">
                            <label id="score-label-home" class="block text-sm font-bold text-slate-700 mb-2 truncate"></label>
                            <input type="number" id="score-home" required min="0" class="w-full text-center text-2xl border-slate-300 border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <span class="text-xl font-bold text-slate-400 mt-6">-</span>
                        <div class="text-center w-1/2">
                            <label id="score-label-away" class="block text-sm font-bold text-slate-700 mb-2 truncate"></label>
                            <input type="number" id="score-away" required min="0" class="w-full text-center text-2xl border-slate-300 border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition">Save Result</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Data Structure & Security
        const ADMIN_PASSWORD = "admin2026";
        let isAdmin = false; 

        const participants = ["Ngurah", "Wipradnyana", "Wage", "Suta", "Putu Ardi", "Made Mudiana", "Darsika", "Sony"];
        
        const defaultMatches = [
            { id: 1, home: "Mexico", away: "South Africa", homeScore: null, awayScore: null, status: "Upcoming", date: "11 Jun 2026", bets: []},
            { id: 2, home: "USA", away: "Paraguay", homeScore: null, awayScore: null, status: "Upcoming", date: "12 Jun 2026", bets: []},
            { id: 3, home: "Brazil", away: "Morocco", homeScore: null, awayScore: null, status: "Upcoming", date: "13 Jun 2026", bets: []},
            { id: 4, home: "Germany", away: "Curaçao", homeScore: null, awayScore: null, status: "Upcoming", date: "14 Jun 2026", bets: []},
            { id: 5, home: "Netherlands", away: "Japan", homeScore: null, awayScore: null, status: "Upcoming", date: "14 Jun 2026", bets: []},
            { id: 6, home: "Sweden", away: "Tunisia", homeScore: null, awayScore: null, status: "Upcoming", date: "15 Jun 2026", bets: []},
            { id: 7, home: "Spain", away: "Cape Verde", homeScore: null, awayScore: null, status: "Upcoming", date: "15 Jun 2026", bets: []},
            { id: 8, home: "Belgium", away: "Egypt", homeScore: null, awayScore: null, status: "Upcoming", date: "15 Jun 2026", bets: []},
            { id: 9, home: "Saudi Arabia", away: "Uruguay", homeScore: null, awayScore: null, status: "Upcoming", date: "15 Jun 2026", bets: []},
            { id: 10, home: "Iran", away: "New Zealand", homeScore: null, awayScore: null, status: "Upcoming", date: "15 Jun 2026", bets: []},
            { id: 11, home: "France", away: "Senegal", homeScore: null, awayScore: null, status: "Upcoming", date: "16 Jun 2026", bets: []},
            { id: 12, home: "Argentina", away: "Algeria", homeScore: null, awayScore: null, status: "Upcoming", date: "16 Jun 2026", bets: []},
            { id: 13, home: "England", away: "Croatia", homeScore: null, awayScore: null, status: "Upcoming", date: "17 Jun 2026", bets: []}
        ];

        let matches = [];

        // Utilities
        const formatIDR = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(num);

        // App Initialization
        function init() {
            const storedAdmin = sessionStorage.getItem('wc2026_admin');
            if (storedAdmin === 'true') isAdmin = true;

            const stored = localStorage.getItem('wc2026_bets_stable');
            
            // Safe parsing with fallback to defaults if empty or corrupted
            if (stored) {
                matches = JSON.parse(stored);
                if (!matches || matches.length === 0) {
                    matches = JSON.parse(JSON.stringify(defaultMatches));
                    saveData();
                }
            } else {
                matches = JSON.parse(JSON.stringify(defaultMatches));
                saveData();
            }
            
            updateUIState();
            renderApp();
        }

        function saveData() {
            localStorage.setItem('wc2026_bets_stable', JSON.stringify(matches));
        }

        function resetData() {
            if (!isAdmin) return;
            if(confirm("Are you sure you want to reset all data? This will clear all bets and scores.")){
                matches = JSON.parse(JSON.stringify(defaultMatches));
                saveData();
                renderApp();
            }
        }

        // Authentication Logic
        function toggleAuth() {
            if (isAdmin) {
                isAdmin = false;
                sessionStorage.removeItem('wc2026_admin');
                updateUIState();
                renderApp();
            } else {
                document.getElementById('admin-password-input').value = '';
                document.getElementById('login-error').classList.add('hidden');
                document.getElementById('login-modal').classList.remove('hidden');
            }
        }

        function submitLogin(e) {
            e.preventDefault();
            const password = document.getElementById('admin-password-input').value;
            
            if (password === ADMIN_PASSWORD) {
                isAdmin = true;
                sessionStorage.setItem('wc2026_admin', 'true');
                closeModal('login-modal');
                updateUIState();
                renderApp();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function updateUIState() {
            const btnLogin = document.getElementById('btn-login');
            const btnReset = document.getElementById('btn-reset');
            const statusBadge = document.getElementById('auth-status-badge');

            if (isAdmin) {
                btnLogin.innerHTML = "🔓 Logout";
                btnLogin.classList.replace('bg-slate-800', 'bg-red-600');
                btnLogin.classList.replace('hover:bg-slate-700', 'hover:bg-red-700');
                btnReset.classList.remove('hidden');
                statusBadge.innerText = "Admin Mode Active";
                statusBadge.classList.replace('bg-slate-200', 'bg-emerald-100');
                statusBadge.classList.replace('text-slate-600', 'text-emerald-700');
            } else {
                btnLogin.innerHTML = "🔒 Admin Login";
                btnLogin.classList.replace('bg-red-600', 'bg-slate-800');
                btnLogin.classList.replace('hover:bg-red-700', 'hover:bg-slate-700');
                btnReset.classList.add('hidden');
                statusBadge.innerText = "Viewing as Guest";
                statusBadge.classList.replace('bg-emerald-100', 'bg-slate-200');
                statusBadge.classList.replace('text-emerald-700', 'text-slate-600');
            }
        }

        function renderApp() {
            renderMatches();
            renderLeaderboardAndDebts();
        }

        // Render Functions
        function renderMatches() {
            const container = document.getElementById('matches-container');
            container.innerHTML = '';
            
            matches.forEach(m => {
                const isFinished = m.status === 'Finished';
                const scoreHTML = isFinished 
                    ? `<span class="font-bold text-xl text-slate-800 bg-slate-100 px-3 py-1 rounded-md">${m.homeScore} - ${m.awayScore}</span>` 
                    : `<span class="text-xs bg-blue-100 text-blue-800 py-1 px-2 rounded-full font-bold tracking-wide uppercase">Upcoming</span>`;
                
                let betsHTML = '';
                if (m.bets && m.bets.length > 0) {
                    betsHTML = `<div class="mt-4 border-t pt-3">
                        <ul class="space-y-2">
                            ${m.bets.map(b => {
                                let handicapStr = '';
                                if (b.handicapTeam && b.handicapValue > 0) {
                                    handicapStr = `<span class="block mt-1 text-xs text-orange-600 bg-orange-50 px-2 py-0.5 rounded inline-block">Handicap: ${b.handicapTeam} +${b.handicapValue}</span>`;
                                }
                                
                                const editButton = isAdmin 
                                    ? `<button onclick="openEditBetModal(${m.id}, ${b.id})" class="text-xs text-blue-600 bg-blue-50 hover:bg-blue-100 px-2 py-1 rounded font-medium transition">✏️ Edit Bet</button>`
                                    : ``;

                                return `
                                <li class="text-sm bg-slate-50 p-3 rounded-lg flex flex-col border border-slate-100 group relative">
                                    <div class="flex justify-between items-start">
                                        <div class="flex flex-col">
                                            <span><b class="text-slate-800">${b.p1}</b> <span class="text-slate-400 text-xs">(${b.p1Choice})</span></span>
                                            <span class="text-slate-400 text-xs italic">vs</span>
                                            <span><b class="text-slate-800">${b.p2}</b> <span class="text-slate-400 text-xs">(${b.p2Choice})</span></span>
                                        </div>
                                        <div class="text-right flex flex-col items-end gap-2">
                                            <span class="font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded">${formatIDR(b.amount)}</span>
                                            ${editButton}
                                        </div>
                                    </div>
                                    ${handicapStr}
                                </li>
                            `}).join('')}
                        </ul>
                    </div>`;
                }

                let actionsHTML = '';
                if (isAdmin) {
                    actionsHTML = `
                        <div class="mt-4 flex gap-2">
                            <button onclick="openBetModal(${m.id})" class="flex-1 bg-white border border-blue-600 text-blue-600 hover:bg-blue-50 py-2 rounded-lg text-sm font-bold transition">Add Bet</button>
                            <button onclick="openResultModal(${m.id})" class="flex-1 ${isFinished ? 'bg-slate-600 hover:bg-slate-700' : 'bg-blue-600 hover:bg-blue-700'} text-white py-2 rounded-lg text-sm font-bold transition">
                                ${isFinished ? 'Edit Result' : 'Set Result'}
                            </button>
                        </div>`;
                }

                const card = `
                    <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200 flex flex-col justify-between h-full">
                        <div>
                            <div class="flex justify-between items-center mb-4">
                                <span class="text-xs text-slate-400 font-bold tracking-wider uppercase">${m.date}</span>
                                ${scoreHTML}
                            </div>
                            <div class="flex justify-between items-center text-lg font-bold mb-2">
                                <span class="w-2/5 text-right">${m.home}</span>
                                <span class="w-1/5 text-center text-slate-300 text-sm">vs</span>
                                <span class="w-2/5 text-left">${m.away}</span>
                            </div>
                            ${betsHTML}
                        </div>
                        ${actionsHTML}
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        function renderLeaderboardAndDebts() {
            const tbody = document.getElementById('leaderboard-body');
            const debtsList = document.getElementById('debts-list');
            tbody.innerHTML = '';
            debtsList.innerHTML = '';

            let stats = {};
            let debts = {}; 
            
            // Ensure ALL participants are listed, even if they have 0 bets
            participants.forEach(p => {
                stats[p] = { name: p, net: 0 };
                debts[p] = {};
            });

            matches.forEach(m => {
                if (m.status === 'Finished' && m.homeScore !== null && m.awayScore !== null && m.bets) {
                    m.bets.forEach(b => {
                        let homeAdjusted = m.homeScore;
                        let awayAdjusted = m.awayScore;
                        
                        if (b.handicapTeam === m.home) homeAdjusted += b.handicapValue;
                        if (b.handicapTeam === m.away) awayAdjusted += b.handicapValue;

                        let winner = null;
                        if (homeAdjusted > awayAdjusted) winner = m.home;
                        else if (awayAdjusted > homeAdjusted) winner = m.away;
                        
                        if (winner) { 
                            if (b.p1Choice === winner) {
                                stats[b.p1].net += b.amount;
                                stats[b.p2].net -= b.amount;
                                debts[b.p2][b.p1] = (debts[b.p2][b.p1] || 0) + b.amount;
                                debts[b.p1][b.p2] = (debts[b.p1][b.p2] || 0) - b.amount;
                            } else if (b.p2Choice === winner) {
                                stats[b.p2].net += b.amount;
                                stats[b.p1].net -= b.amount;
                                debts[b.p1][b.p2] = (debts[b.p1][b.p2] || 0) + b.amount;
                                debts[b.p2][b.p1] = (debts[b.p2][b.p1] || 0) - b.amount;
                            }
                        }
                    });
                }
            });

            const sortedStats = Object.values(stats).sort((a, b) => b.net - a.net);

            sortedStats.forEach((s, index) => {
                const colorClass = s.net > 0 ? 'text-emerald-600' : (s.net < 0 ? 'text-red-500' : 'text-slate-50
