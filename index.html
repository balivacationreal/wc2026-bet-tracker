<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 Bet Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans text-slate-800 p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <div class="flex items-center gap-4">
                <img src="./wc-2026-logo.webp" alt="WC 2026 Logo" class="h-16 w-auto object-contain">
                <div>
                    <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Bet Tracker</h1>
                    <p class="text-slate-500 mt-1">Manage 1-on-1 bets in IDR with Handicaps</p>
                </div>
            </div>
            
            <div class="mt-4 md:mt-0 flex flex-col md:flex-row gap-3 items-center">
                <div id="loading-indicator" class="hidden text-sm font-bold text-blue-600 animate-pulse mr-4">
                    Syncing with Cloud...
                </div>
                
                <button id="btn-api-sync" onclick="fetchLiveMatches()" class="hidden bg-blue-50 text-blue-600 hover:bg-blue-100 border border-blue-200 px-4 py-2 rounded-lg font-medium transition text-sm">
                    ⬇️ Fetch API Matches
                </button>

                <button id="btn-reset" onclick="resetData()" class="hidden bg-red-50 text-red-600 hover:bg-red-100 border border-red-200 px-4 py-2 rounded-lg font-medium transition text-sm">
                    Reset Demo Data
                </button>
                
                <button id="btn-login" onclick="toggleAuth()" class="bg-slate-800 text-white hover:bg-slate-700 px-6 py-2 rounded-lg font-medium transition text-sm shadow-sm">
                    🔒 Admin Login
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <div class="flex justify-between items-center border-b pb-2">
                    <h2 class="text-xl font-bold text-slate-800">Fixtures & Bets</h2>
                    <span id="auth-status-badge" class="text-xs font-bold px-2 py-1 bg-slate-200 text-slate-600 rounded-md uppercase tracking-wide">Viewing as Guest</span>
                </div>
                <div id="matches-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </div>

            <div class="space-y-6">
                <h2 class="text-xl font-bold text-slate-800 border-b pb-2">Leaderboard</h2>
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
                                <th class="p-4 border-b">Player</th>
                                <th class="p-4 border-b text-right">Net Balance</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body" class="divide-y divide-slate-100">
                            </tbody>
                    </table>
                </div>

                <h2 class="text-xl font-bold text-slate-800 border-b pb-2 mt-8">Settlements (Debts)</h2>
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
                    <ul id="debts-list" class="space-y-3 text-sm">
                        </ul>
                </div>
            </div>
        </div>
    </div>

    <div id="login-modal" class="fixed inset-0 bg-slate-900 bg-opacity-50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden">
            <div class="bg-slate-800 p-4 text-white flex justify-between items-center">
                <h3 class="font-bold text-lg">Admin Access</h3>
                <button onclick="closeModal('login-modal')" class="text-slate-300 hover:text-white text-xl">&times;</button>
            </div>
            <div class="p-6">
                <form id="login-form" onsubmit="submitLogin(event)">
                    <div class="mb-6">
                        <label class="block text-sm font-bold text-slate-700 mb-2">Enter Password</label>
                        <input type="password" id="admin-password-input" required class="w-full border-slate-300 border rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="••••••••">
                        <p id="login-error" class="text-red-500 text-xs mt-2 hidden">Incorrect password. Please try again.</p>
                    </div>
                    <button type="submit" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded-lg transition">Login</button>
                </form>
            </div>
        </div>
    </div>

    <div id="bet-modal" class="fixed inset-0 bg-slate-900 bg-opacity-50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden max-h-[90vh] overflow-y-auto">
            <div class="bg-slate-800 p-4 text-white flex justify-between items-center sticky top-0">
                <h3 id="bet-modal-title" class="font-bold text-lg">Add New Bet</h3>
                <button onclick="closeModal('bet-modal')" class="text-slate-300 hover:text-white text-xl">&times;</button>
            </div>
            <div class="p-6">
                <form id="bet-form" onsubmit="submitBet(event)">
                    <input type="hidden" id="bet-match-id">
                    <input type="hidden" id="bet-id">
                    
                    <div class="mb-4">
                        <label id="label-team-home" class="block text-sm font-bold text-slate-700 mb-1">Team A Pick</label>
                        <select id="player-home" required class="w-full border-slate-300 border rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none"></select>
                    </div>

                    <div class="mb-4">
                        <label id="label-team-away" class="block text-sm font-bold text-slate-700 mb-1">Team B Pick</label>
                        <select id="player-away" required class="w-full border-slate-300 border rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none"></select>
                    </div>

                    <div class="mb-4 border-t pt-4 border-slate-100">
                        <label class="block text-sm font-bold text-slate-700 mb-1">Handicap (Voor) Given To</label>
                        <select id="bet-handicap-team" class="w-full border-slate-300 border rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="">No Handicap</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-bold text-slate-700 mb-1">Handicap Goals (e.g. 0.5, 1, 1.5)</label>
                        <input type="number" id="bet-handicap-value" min="0" step="0.5" value="0" class="w-full border-slate-300 border rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <div class="mb-6 border-t pt-4 border-slate-100">
                        <label class="block text-sm font-bold text-slate-700 mb-1">Bet Amount (IDR)</label>
                        <input type="number" id="bet-amount" required min="1000" step="1000" class="w-full border-slate-300 border rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. 50000">
                    </div>

                    <div class="flex gap-3">
                        <button type="button" id="delete-bet-btn" onclick="deleteBet()" class="hidden bg-red-100 text-red-600 hover:bg-red-200 font-bold py-3 px-4 rounded-lg transition text-sm">
                            🗑️ Delete
                        </button>
                        <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition">
                            Save Bet
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="result-modal" class="fixed inset-0 bg-slate-900 bg-opacity-50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden">
            <div class="bg-slate-800 p-4 text-white flex justify-between items-center">
                <h3 class="font-bold text-lg">Edit Match Result</h3>
                <button onclick="closeModal('result-modal')" class="text-slate-300 hover:text-white">&times;</button>
            </div>
            <div class="p-6">
                <form id="result-form" onsubmit="submitResult(event)">
                    <input type="hidden" id="result-match-id">
                    
                    <div class="flex items-center justify-between gap-4 mb-6">
                        <div class="text-center w-1/2">
                            <label id="score-label-home" class="block text-sm font-bold text-slate-700 mb-2 truncate"></label>
                            <input type="number" id="score-home" required min="0" class="w-full text-center text-2xl border-slate-300 border rounded-lg p-2 focus:ring-2 focus:ring-blue-
